spring:
  profiles:
    active: dev
    include:
      - hw
      - custom
      - dynamic-${VORTEX_RDS_TYPE:mysql}
  application:
    name: vortex-sample-backboot
  cache:
    type: jcache
    jcache:
      provider: org.ehcache.jsr107.EhcacheCachingProvider
      config: classpath:ehcache.xml
  jackson:
    serialization:
      write-dates-as-timestamps: true
    time-zone: GMT+8
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    redis:
      host: ${VORTEX_REDIS_IP}
      port: ${VORTEX_REDIS_PORT}
      password: ${VORTEX_REDIS_PASSWORD}
      database: ${VORTEX_REDIS_DATABASE}
      lettuce:
        pool:
          max-idle: 8
          min-idle: 0
          max-active: 8
          max-wait: -1
  task:
    scheduling:
      pool:
        size: 8

mybatis-plus:
  global-config:
    db-config:
      update-strategy: ignored
  type-handlers-package: com.vortex.cloud.**.handler

server:
  port: 16667
  compression:
    enabled: true

springdoc:
  swagger-ui:
    doc-expansion: none

xxl.job:
  ### 调度中心部署跟地址 [选填]：如调度中心集群部署存在多个地址则用逗号分隔。执行器将会使用该地址进行"执行器心跳注册"和"任务结果回调"；为空则关闭自动注册；
  admin.addresses: ${VORTEX_XXL_JOB_ADMIN_ADDRESSES:http://192.168.1.233:20196/xxl-job-admin}
  ### 执行器通讯TOKEN [选填]：非空时启用；
  accessToken:
  executor:
    ### 执行器AppName [选填]：执行器心跳注册分组依据；为空则关闭自动注册
    appname: ${spring.application.name}
    ### 执行器注册 [选填]：优先使用该配置作为注册地址，为空时使用内嵌服务 ”IP:PORT“ 作为注册地址。从而更灵活的支持容器类型执行器动态IP和动态映射端口问题。
    address:
    ### 执行器IP [选填]：默认为空表示自动获取IP，多网卡时可手动设置指定IP，该IP不会绑定Host仅作为通讯实用；地址信息用于 "执行器注册" 和 "调度中心请求并触发任务"；
    ip: ${spring.cloud.client.ip-address}
    ### 执行器端口号 [选填]：小于等于0则自动获取；默认端口为9999，单机部署多个执行器时，注意要配置不同执行器端口；
    port: ${VORTEX_XXL_JOB_EXECUTOR_PORT:0}
    ### 执行器运行日志文件存储磁盘路径 [选填] ：需要对该路径拥有读写权限；为空则使用默认路径；
    logpath:
    ### 执行器日志文件保存天数 [选填] ： 过期日志自动清理, 限制值大于等于3时生效; 否则, 如-1, 关闭自动清理功能；
    logretentiondays: 30
